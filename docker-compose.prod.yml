services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: knowledge_keeper
      POSTGRES_USER: knowledge_keeper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge_keeper"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: prod
    volumes:
      - media_data:/app/var/media
      - static_data:/app/var/static
    env_file: .env.prod
    environment:
      DJANGO_COLLECT_STATIC: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: prod
    command: celery -A config worker --loglevel=info --concurrency=2
    volumes:
      - media_data:/app/var/media
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: prod
    ports:
      - "80:80"
    volumes:
      - media_data:/app/media:ro
      - static_data:/app/static:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
  static_data:
