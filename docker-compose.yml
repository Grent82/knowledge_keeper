services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: knowledge_keeper
      POSTGRES_USER: knowledge_keeper
      POSTGRES_PASSWORD: knowledge_keeper
    volumes:
      - ./var/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge_keeper"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    volumes:
      - ./backend:/app/backend
      - ./var/media:/app/var/media
      - ./var/whisper_models:/app/var/whisper_models
    ports:
      - "9000:9000"
    env_file: .env.docker
    environment:
      DATABASE_URL: postgresql://knowledge_keeper:knowledge_keeper@postgres:5432/knowledge_keeper
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    command: celery -A config worker --loglevel=info
    volumes:
      - ./backend:/app/backend
      - ./var/media:/app/var/media
      - ./var/whisper_models:/app/var/whisper_models
    env_file: .env.docker
    environment:
      DATABASE_URL: postgresql://knowledge_keeper:knowledge_keeper@postgres:5432/knowledge_keeper
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    volumes:
      - ./frontend:/app/frontend
      # Preserve container node_modules (don't overwrite with host)
      - /app/frontend/node_modules
      - /app/node_modules
    ports:
      - "3001:3000"
    environment:
      VITE_BACKEND_TARGET: http://backend:9000
    depends_on:
      - backend

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes: {}
